# This profile is activated on Railway automatically via SPRING_PROFILES_ACTIVE=railway

# PostgreSQL — Railway injects DATABASE_URL as postgres://user:pass@host:port/db
# Spring needs jdbc:postgresql:// format, so we use a workaround via env vars
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CRITICAL: never use ddl-auto=update in production — it can silently corrupt schema.
# Use validate (fail-fast if schema drifts) and manage migrations with Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update

# CORS — lock to your deployed frontend domain
cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:8080}

# API key for bridge/ingest and reset-full endpoints
bridge.api-key=${BRIDGE_API_KEY:demo-key}
