# ─── Server ──────────────────────────────────────────────────────────────────
# Railway sets $PORT automatically — fallback 8080 for local
server.port=${PORT:8080}

# ─── Database ────────────────────────────────────────────────────────────────
# LOCAL  (no DATABASE_URL set)  → H2 in-memory, zero setup
# RAILWAY (DATABASE_URL set)    → PostgreSQL, persistent

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:upimesh;DB_CLOSE_DELAY=-1}
spring.datasource.username=${PGUSER:sa}
spring.datasource.password=${PGPASSWORD:}

# Auto-pick dialect
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console off everywhere
spring.h2.console.enabled=false

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{25} - %msg%n

# ─── UPI Mesh ────────────────────────────────────────────────────────────────
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400

# ─── Security ─────────────────────────────────────────────────────────────────
# CORS: override CORS_ALLOWED_ORIGIN env var in production to your frontend domain
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:8080}

# Bridge API key: override BRIDGE_API_KEY env var in production (Railway secret)
# Default "demo-key" only for local dev — always set a real secret in Railway.
bridge.api-key=${BRIDGE_API_KEY:demo-key}

# ─── App ─────────────────────────────────────────────────────────────────────
spring.application.name=upi-offline-mesh
